spring.application.name=library-manager

spring.data.mongodb.uri=${MONGODB_URI:mongodb://admin:admin123@localhost:27017/library_manager?authSource=admin}

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

spring.cache.type=redis

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

mongock.enabled=true
mongock.migration-scan-package=com.library.library_manager.config.migration

logging.level.org.springframework.cache=TRACE
logging.level.org.springframework.data.redis.cache=TRACE
